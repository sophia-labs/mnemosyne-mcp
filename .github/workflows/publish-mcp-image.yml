name: Publish MCP Image

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional immutable tag override (for example: mcp-20260302-4f8a9c1)"
        required: false
        type: string
      publish_latest:
        description: Also push latest as a convenience alias
        required: true
        default: true
        type: boolean

concurrency:
  group: mcp-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-1
  AWS_ACCOUNT_ID: "816069160218"
  ECR_REPOSITORY: mnemosyne-mcp
  ROLE_ARN: arn:aws:iam::816069160218:role/mnemosyne-dev-gh-ecr-push

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_repository: ${{ steps.meta.outputs.image_repository }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Assume ECR push role
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.ROLE_ARN }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          repo="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"

          image_tag=""
          publish_latest="true"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            image_tag="$(jq -r '.inputs.image_tag // ""' "${GITHUB_EVENT_PATH}")"
            publish_latest="$(jq -r '.inputs.publish_latest // "true"' "${GITHUB_EVENT_PATH}")"
          fi

          if [[ -z "${image_tag}" ]]; then
            image_tag="mcp-$(date -u +%Y%m%d%H%M)-${GITHUB_SHA::12}"
          fi

          tags="${repo}:${image_tag}"
          if [[ "${publish_latest}" == "true" ]]; then
            tags="${tags}"$'\n'"${repo}:latest"
          fi

          {
            echo "image_repository=${repo}"
            echo "image_tag=${image_tag}"
            echo "image_ref=${repo}:${image_tag}"
            echo "publish_latest=${publish_latest}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write summary
        shell: bash
        run: |
          {
            echo "### MCP image published"
            echo ""
            echo "- Repository: \`${{ steps.meta.outputs.image_repository }}\`"
            echo "- Immutable tag: \`${{ steps.meta.outputs.image_tag }}\`"
            echo "- Image ref: \`${{ steps.meta.outputs.image_ref }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- Published latest: \`${{ steps.meta.outputs.publish_latest }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"
